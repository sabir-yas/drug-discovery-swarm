services:
  # ── Backend ──────────────────────────────────────────────────────────
  - type: web
    name: drug-discovery-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install fastapi==0.104.1 uvicorn==0.24.0 websockets==12.0 redis==5.0.1
      ray==2.9.0 selfies==2.1.1 umap-learn==0.5.5 numpy==1.26.2 scipy==1.11.4
      scikit-learn==1.3.2 aiofiles==23.2.1 pydantic==2.5.2 setuptools packaging &&
      pip install rdkit-pypi || true &&
      sed -i 's/from pkg_resources import packaging/import packaging/'
      /opt/render/project/src/.venv/lib/python3.10/site-packages/ray/_private/pydantic_compat.py || true
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        fromService:
          name: drug-discovery-redis
          type: redis
          property: connectionString
      - key: PYTHONNOUSERSITE
        value: "1"
    plan: free

  # ── Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: drug-discovery-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_HOST
        sync: false   # Set this manually in Render dashboard after backend deploys
    plan: free

  # ── Redis ─────────────────────────────────────────────────────────────
  - type: redis
    name: drug-discovery-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
